<script>
  const N8N_GET_URL = 'https://n8n.admartproducts.com/webhook/get-vr';
  const N8N_POST_URL = 'https://n8n.admartproducts.com/webhook/vr-form-submit';

  // 1. 將 handleStatusChange 移到最外層，確保 HTML 的 onchange 找得到它
  function handleStatusChange(val) {
    const field = document.getElementById('changes-field');
    const area = document.getElementById('change-textarea');
    const label = document.getElementById('change-label');

    if (val === 'Changes Requested' || val === 'Suggestion') {
      field.classList.remove('hidden');
      area.required = true;
      if (val === 'Suggestion') {
        label.textContent = "What kind of product are you looking for? *";
        area.placeholder = "Example: I need something in blue, or a lower price point...";
      } else {
        label.textContent = "Description of Changes *";
        area.placeholder = "Please specify what needs to be fixed...";
      }
    } else {
      field.classList.add('hidden');
      area.required = false;
      area.value = ""; 
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const pid = params.get('pid');
    const loader = document.getElementById('loading-overlay');

    if (!pid) {
      loader.innerHTML = '❌ Error: Missing PID in URL.<br><small>Please use the link provided in your email.</small>';
      return;
    }

    // 2. 抓取資料
    fetch(`${N8N_GET_URL}?pid=${pid}`)
      .then(res => { if (!res.ok) throw new Error(); return res.json(); })
      .then(data => {
        const item = Array.isArray(data) ? data[0] : data;
        document.getElementById('info-job').textContent = item.order_number || '---';
        
        if (item.preview_image) {
          const img = document.getElementById('main-img');
          img.src = item.preview_image;
          img.onload = () => {
             img.classList.remove('hidden');
             document.getElementById('placeholder').classList.add('hidden');
             loader.classList.add('hidden');
          };
        } else {
          document.getElementById('placeholder').textContent = 'No preview available.';
          loader.classList.add('hidden');
        }
      })
      .catch(err => {
        console.error(err);
        loader.innerHTML = '❌ Error: Could not connect to server.<br><small>Check if CORS is enabled in n8n.</small>';
      });

    // 3. 表單提交
    document.getElementById('approval-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'SUBMITTING...';

      const formData = new FormData();
      formData.append('name', this.name.value);
      formData.append('email', this.email.value);
      formData.append('status', this.status.value);
      formData.append('change_details', this.change_details.value);
      formData.append('pid', pid);

      const fileInput = this.querySelector('input[name="file_attachment"]');
      if (fileInput.files.length > 0) {
        formData.append('file_attachment', fileInput.files[0]); 
      }

      fetch(N8N_POST_URL, { 
        method: 'POST', 
        body: formData 
      })
      .then(res => {
        if (!res.ok) throw new Error();
        document.getElementById('approval-form').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
      })
      .catch(err => {
        alert('❌ Error: Could not submit your response.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit My Response';
      });
    });
  }); // 這裡補上了遺漏的括號
</script>
